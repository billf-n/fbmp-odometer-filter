<!DOCTYPE html>
<html>

<head>
  <title>Facebook Marketplace odometer filter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI Historic", "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      width: min-content;
      /* height: 300px; */
    }

    .fbFont {
      font-family: "Segoe UI Historic", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    #filterForm {
      /* display: flex;
      flex-direction: column; */
      width: min-content;
      margin: 1.5em 1em;
    }

    #filterHeading {
      margin-inline-start: 0px;
      margin-top: 0px;
    }

    #range {
      display: flex;
      margin-bottom: 2em;
    }

    .filterWrap {
      display: grid;
    }

    /* .filterDropdown {
      position: absolute;
      justify-self: right;
      height: 36px;
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
    } */

    .filterInput {
      width: 160px;
      height: 36px;
      border-radius: 6px;
      border-width: 1px;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 500;
    }

    #to {
      padding: 0px 12px;
      line-height: 36px;
      font-size: 16px;
    }

    #filter {
      border-radius: 6px;
      border-width: 1px;
      border-color: transparent;
      background-color: rgb(235, 245, 255);
      height: 36px;
      width: 100%;
      cursor: pointer;
    }

    #filterText {
      color: rgb(56, 88, 152);
      font-size: 16px;
      font-weight: 600;
      text-overflow: ellipsis;
    }

    .dropdown-container {
      position: relative;
      display: inline-block;
    }

    .dropdown-list {
      position: absolute;
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
      background: white;
      list-style: none;
      padding: 0;
      margin: 0;
      display: none;
      z-index: 10;
    }

    .dropdown-list li {
      padding: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .dropdown-list li:hover {
      background-color: #f0f0f0;
    }

    .dropdown-container:focus-within .dropdown-list {
      display: block;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <div id="filterForm">
      <h1 id="filterHeading" class="fbFont">Filter by odometer:</h1>
      <div id="range">
        <div class="filterWrap">
          <label class="filterLabel fbFont" for="lowFilter"></label>
          <div class="dropdown-container">
            <input class="filterInput fbFont" id="lowFilter" name="lowFilter" inputmode="numeric" pattern="[0-9]+"
              autocomplete="off" placeholder="Min">
            <ul class="dropdown-list fbFont" id="lowFilterDropdown">
              <li>0</li>
              <li>25000</li>
              <li>50000</li>
              <li>75000</li>
              <li>100000</li>
              <li>125000</li>
              <li>150000</li>
              <li>175000</li>
              <li>200000</li>
            </ul>
          </div>
        </div>

        <span id="to" class="fbFont">to</span>

        <div class="filterWrap">
          <label for="highFilter"></label>
          <div class="dropdown-container">
            <input class="filterInput fbFont" id="highFilter" name="highFilter" inputmode="numeric" pattern="[0-9]+"
              autocomplete="off" placeholder="Max">
            <ul class="dropdown-list fbFont" id="highFilterDropdown">
              <li>0</li>
              <li>25000</li>
              <li>50000</li>
              <li>75000</li>
              <li>100000</li>
              <li>125000</li>
              <li>150000</li>
              <li>175000</li>
              <li>200000</li>
            </ul>
          </div>

        </div>
      </div>
      <button id="filter" aria-label="Filter listings by odometer">
        <span id="filterText" class="fbFont">Filter</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
